# paths and parameters for cafa data
dataset_root: ${cache_path}/raw

sources:
  seqs_path: ${.dataset_root}/toy_train.fasta
  terms_path: ${.dataset_root}/terms_train_toy.tsv
  ia_path: ${.dataset_root}/ia.txt  # optional override
  go_path: ${.dataset_root}/go-basic.obo  # optional override

split:
  seed: 1337
  ratios:
    train: 0.8
    val: 0.1
    test: 0.1

train_csv: ${cache_path}/splits/train.csv
val_csv:   ${cache_path}/splits/val.csv
test_csv:  ${cache_path}/splits/test.csv
embeddings_npz: ${system.cache_dir}/esm1b_cafa.npz
go_prior_npz:   ${system.cache_dir}/go_prior_cafa.npz

go_prior:
  obo_path: ${..sources.go_path}
  train_split_csv: ${..train_csv}
  top_k:
    MF: 100
    BP: 100
    CC: 100

neighbors:
  batch_size: 64
  top_k: 20
  fanout_1: 20
  fanout_2: 10
  global_path: null
  global_train_path: null
  global_val_path: null
  global_test_path: null
min_length: 10
train_manifest: null
val_manifest: null
test_manifest: null
