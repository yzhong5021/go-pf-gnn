# @package _global_
defaults:
  - _self_

hpo:
  study:
    name: decoupled_sweep_${aspect}_${now:%Y%m%d_%H%M%S}
    storage: null            # or sqlite:///${hydra:runtime.output_dir}/optuna.db
    direction: maximize
    timeout_minutes: 720
    timeout_seconds: 43200
    seed: 2025
  search_space:
    - name: optimizer.lr
      type: float
      low: 1e-5
      high: 5e-3
      log: true
    - name: optimizer.weight_decay
      type: float
      low: 1e-6
      high: 1e-2
      log: true
    - name: model.seq_gating.shared_dim
      type: categorical
      choices:
        - 128
        - 256
        - 384
    - name: model.graph.protein_stacks
      type: int
      low: 2
      high: 4
      step: 1
    - name: model.seq_gating.dropout
      type: float
      low: 0.0
      high: 0.5
    - name: data_config.neighbors.batch_size
      type: categorical
      choices:
        - 32
        - 64
        - 96
    - name: scheduler.name
      type: categorical
      choices:
        - step
    - name: scheduler.gamma
      type: float
      low: 0.85
      high: 0.98
