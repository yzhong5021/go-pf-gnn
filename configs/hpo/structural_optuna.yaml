# @package _global_
# Optuna HPO settings for attn_pe structural sweeps.

defaults:
  - _self_

hpo:
  study:
    name: gated_pe_hpo_${aspect}
    storage: sqlite:////orcd/home/002/lerchen/code/cafa_proj/results/hpo_gated_pe/optuna.db
    direction: maximize
    n_trials: 40
    timeout_hours: 48
    max_failures: 3
    n_jobs: 1
    seed: 2025
  sampler:
    type: tpe
    multivariate: true
    group: true
    constant_liar: true
    n_startup_trials: 10
  pruner:
    type: hyperband
    min_resource: 4
    warmup_epochs: 5
    reduction_factor: 3
  checkpoints:
    top_k: 3
  multi_seed:
    enabled: true
    top_k: 3
    seeds: [10, 11, 12]
  search_space:
    - name: optimizer.lr
      type: float
      low: 1.0e-05
      high: 5.0e-04
      log: true
    - name: scheduler.warmup_lr
      type: float
      low: 1.0e-07
      high: 5.0e-04
      log: true
    - name: scheduler.min_lr
      type: float
      low: 1.0e-07
      high: 5.0e-05
      log: true
    - name: optimizer.weight_decay
      type: float
      low: 1.0e-06
      high: 1.0e-02
      log: true
    - name: optimizer.beta2
      type: categorical
      choices: [0.98, 0.999]
    - name: optimizer.eps
      type: categorical
      choices: [1.0e-08, 1.0e-06]
    - name: model.gcn.dropout
      type: float
      low: 0.0
      high: 0.3
    - name: model.sqb.dccn.dropout
      type: float
      low: 0.0
      high: 0.3
    - name: model.prost_graph.dropout
      type: float
      low: 0.0
      high: 0.3
    - name: model.cross_attention.dropout
      type: float
      low: 0.0
      high: 0.3
    - name: model.loss.focusing
      type: float
      low: 1.0
      high: 4.0
    - name: model.loss.balancing
      type: float
      low: 0.1
      high: 0.5
